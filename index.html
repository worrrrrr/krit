<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พื้นที่แห่งความจริง</title>
    <style>
        body { background-color: #1a1a1a; color: #d1d1d1; font-family: 'Sarabun', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 90%; max-width: 600px; text-align: center; }
        #output { min-height: 200px; margin-bottom: 20px; line-height: 1.6; transition: opacity 0.5s; }
        input { background: none; border: none; border-bottom: 1px solid #444; color: #fff; width: 100%; padding: 10px; text-align: center; outline: none; font-size: 1.1em; }
        .warm-fade { animation: fadeIn 2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="output" class="warm-fade">"ผมอยู่ตรงนี้... พร้อมที่จะรับฟังและประคองความจริงของคุณครับ"</div>
        <input type="text" id="userInput" placeholder="พิมพ์ความรู้สึกของคุณที่นี่..." onkeypress="handleChat(event)">
    </div>

    <script>
        const API_KEY = "AIzaSyBVZF1o7Ike6L6HsVp3ka8Lr-NmTXeI0Kw"; 

        async function handleChat(e) {
    if (e.key === 'Enter') {
        const inputField = document.getElementById('userInput');
        const input = inputField.value;
        const output = document.getElementById('output');
        
        if (!input) return;

        output.style.opacity = 0.5;
        output.innerHTML = "กำลังประมวลความจริงของคุณ...";

        try {
            // แก้ไขตรงนี้: ใช้ fetch ครอบ URL และ Options ให้ถูกต้อง
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ 
                            text: `คุณคือ "กฤช" นักวิเคราะห์จิตวิทยา INFJ 5w4. วิเคราะห์แบบแอบผ่า (Stealth Dissection): ซ่อน The Slice และ Red Flag ไว้ในใจ แต่ตอบกลับด้วยความนุ่มนวลและประคองใจเสมอ: ${input}` 
                        }] 
                    }]
                })
            });

            const data = await response.json();
            
            // ตรวจสอบว่ามีข้อมูลกลับมาจริงไหม
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const aiText = data.candidates[0].content.parts[0].text;
                output.innerHTML = aiText; // แสดงผลความอบอุ่น
                console.log("เก็บร่างสำเร็จ:", { user: input, analysis: aiText }); // แอบเก็บข้อมูล
            } else {
                output.innerHTML = "กฤชกำลังเรียบเรียงความคิด... ลองพิมพ์ใหม่อีกครั้งนะครับ";
            }
        } catch (error) {
            output.innerHTML = "การเชื่อมต่อติดขัดเล็กน้อย... ตรวจสอบ API Key ของคุณอีกครั้งนะครับ";
            console.error("Error:", error);
        }

        output.style.opacity = 1;
        inputField.value = "";
    }
}
    </script>
</body>
</html>
